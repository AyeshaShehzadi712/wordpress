<!--
  Integrity Air — floating chat widget for WordPress (navy + gold theme).

  HOW TO USE:
  1. Set API_BASE below to your PUBLIC HTTPS backend URL (must be https://).
  2. Copy this ENTIRE file and paste it into your WPCode footer snippet
     (Auto Insert → Site Wide Footer), then Save and make it Active.

  RECOLOR FOR ANY SITE: change the values in the THEME block at the top of the
  <style> — that's the only place colors live. Examples:
    • Navy + gold (this file)         → as set below
    • Integrity Air blue + yellow     → --iacw-accent:#f5c518; --iacw-header1:#2f5fd0; --iacw-header2:#234aa3;

  Everything is namespaced with `iacw-` so it won't collide with your theme.
-->
<style>
  :root {
    /* ===== THEME — change colors here only ===== */
    --iacw-accent:  #d4af5a;   /* launcher + send button + user bubble (gold) */
    --iacw-accent2: #b1882f;   /* darker gold for gradient depth */
    --iacw-header1: #15243a;   /* header gradient top (navy) */
    --iacw-header2: #0e1a2b;   /* header gradient bottom (navy) */
    --iacw-on-accent: #15243a; /* icon/text color sitting ON the gold */
    --iacw-ai-bg:   #ffffff;   /* assistant bubble background */
    --iacw-ai-text: #1c2536;   /* assistant bubble text */
    --iacw-panel-bg:#f4f6fb;   /* message area background */
    /* ============================================ */
  }
  #iacw-launch {
    position: fixed; right: 22px; bottom: 22px; z-index: 2147483000;
    width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--iacw-accent), var(--iacw-accent2));
    color: var(--iacw-on-accent);
    box-shadow: 0 8px 22px rgba(20,35,70,.32);
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s ease;
  }
  #iacw-launch:hover { transform: scale(1.06); }
  #iacw-launch svg { width: 32px; height: 32px; }
  #iacw-panel {
    position: fixed; right: 22px; bottom: 98px; z-index: 2147483000;
    width: 374px; max-width: calc(100vw - 44px); height: 548px; max-height: calc(100vh - 130px);
    background: #fff; border-radius: 20px; overflow: hidden; display: none;
    flex-direction: column; box-shadow: 0 18px 52px rgba(15,26,43,.28);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  #iacw-panel.iacw-open { display: flex; }
  .iacw-header {
    background: linear-gradient(135deg, var(--iacw-header1), var(--iacw-header2));
    color: #fff; padding: 16px 18px; display: flex; align-items: center; gap: 12px;
  }
  .iacw-header .iacw-av {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--iacw-accent), var(--iacw-accent2));
    color: var(--iacw-on-accent);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .iacw-header .iacw-av svg { width: 22px; height: 22px; }
  #iacw-panel .iacw-header h4 { margin: 0 !important; padding: 0 !important; font-size: 16px !important; font-weight: 700 !important; line-height: 1.25 !important; letter-spacing: .2px; color: #fff !important; font-family: inherit !important; }
  .iacw-header .iacw-sub { font-size: 12px; font-weight: 600; opacity: .9; margin-top: 2px;
    display: flex; align-items: center; gap: 6px; }
  .iacw-header .iacw-dot { width: 8px; height: 8px; border-radius: 50%; background: #57e389; display: inline-block; }
  .iacw-x { margin-left: auto; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; opacity: .9; line-height: 1; }
  .iacw-msgs { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; background: var(--iacw-panel-bg); }
  .iacw-row { display: flex; }
  .iacw-row.iacw-user { justify-content: flex-end; }
  .iacw-b {
    position: relative; max-width: 80%; padding: 11px 15px; font-size: 14px; line-height: 1.5;
    white-space: pre-wrap; word-wrap: break-word;
    border-radius: 18px;
  }
  /* assistant: white speech bubble with a tail on the lower-left */
  .iacw-row.iacw-ai .iacw-b {
    background: var(--iacw-ai-bg); color: var(--iacw-ai-text);
    border-bottom-left-radius: 5px; box-shadow: 0 2px 8px rgba(15,26,43,.06);
  }
  .iacw-row.iacw-ai .iacw-b::after {
    content: ""; position: absolute; left: -6px; bottom: 6px;
    width: 0; height: 0; border: 7px solid transparent; border-right-color: var(--iacw-ai-bg); border-left: 0;
  }
  /* user: gold speech bubble with a tail on the lower-right */
  .iacw-row.iacw-user .iacw-b {
    background: linear-gradient(135deg, var(--iacw-accent), var(--iacw-accent2));
    color: var(--iacw-on-accent); font-weight: 600; border-bottom-right-radius: 5px;
  }
  .iacw-row.iacw-user .iacw-b::after {
    content: ""; position: absolute; right: -6px; bottom: 6px;
    width: 0; height: 0; border: 7px solid transparent; border-left-color: var(--iacw-accent2); border-right: 0;
  }
  .iacw-typing .iacw-b span { display:inline-block; width:6px; height:6px; margin:0 1px; background:#7a869a;
    border-radius:50%; opacity:.4; animation:iacwblink 1.2s infinite both; }
  .iacw-typing .iacw-b span:nth-child(2){animation-delay:.2s;} .iacw-typing .iacw-b span:nth-child(3){animation-delay:.4s;}
  @keyframes iacwblink {0%,80%,100%{opacity:.3;}40%{opacity:1;}}
  .iacw-compose { display:flex; gap:8px; padding:12px; border-top:1px solid #e4e8f0; background:#fff; }
  .iacw-compose input { flex:1; border:1px solid #e4e8f0; border-radius:22px; padding:11px 16px; font-size:14px; outline:none; }
  .iacw-compose input:focus { border-color: var(--iacw-accent); }
  .iacw-compose button {
    border:none; background: linear-gradient(135deg, var(--iacw-accent), var(--iacw-accent2));
    color: var(--iacw-on-accent); width:44px; height:44px; border-radius:50%; font-size:16px; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .iacw-compose button:disabled { opacity:.5; cursor:default; }
  .iacw-compose button svg { width:18px; height:18px; }
</style>

<!-- headset / support-agent icon, reused in launcher + header -->
<button id="iacw-launch" title="Chat with us" aria-label="Open chat">
  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M12 2a8 8 0 0 0-8 8v4.5A2.5 2.5 0 0 0 6.5 17H8a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1H6v-1a6 6 0 1 1 12 0v1h-2a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h1.2a3 3 0 0 1-2.7 1.7H13a1 1 0 1 0 0 2h1.5a5 5 0 0 0 4.96-4.34A2.5 2.5 0 0 0 20 14.5V10a8 8 0 0 0-8-8z"/>
  </svg>
</button>

<div id="iacw-panel" role="dialog" aria-label="Chat">
  <div class="iacw-header">
    <div class="iacw-av">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2a8 8 0 0 0-8 8v4.5A2.5 2.5 0 0 0 6.5 17H8a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1H6v-1a6 6 0 1 1 12 0v1h-2a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h1.2a3 3 0 0 1-2.7 1.7H13a1 1 0 1 0 0 2h1.5a5 5 0 0 0 4.96-4.34A2.5 2.5 0 0 0 20 14.5V10a8 8 0 0 0-8-8z"/>
      </svg>
    </div>
    <div>
      <h4>Integrity Air Conditioning &amp; Heating</h4>
      <div class="iacw-sub"><span class="iacw-dot"></span> We typically reply instantly</div>
    </div>
    <button class="iacw-x" id="iacw-close" title="Close" aria-label="Close chat">&times;</button>
  </div>
  <div class="iacw-msgs" id="iacw-msgs"></div>
  <div class="iacw-compose">
    <input id="iacw-input" type="text" placeholder="Ask about our services, hours, or book a visit…" autocomplete="off" />
    <button id="iacw-send" title="Send" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 11l18-8-8 18-2-7-8-3z"/></svg>
    </button>
  </div>
</div>

<script>
(function () {
  // ===== SET THIS to your public HTTPS backend URL =====
  var API_BASE = "https://repurpose-nearness-earmark.ngrok-free.dev";
  // =====================================================

  var panel = document.getElementById("iacw-panel");
  var launch = document.getElementById("iacw-launch");
  var msgsEl = document.getElementById("iacw-msgs");
  var inputEl = document.getElementById("iacw-input");
  var sendEl = document.getElementById("iacw-send");
  var greeted = false;

  var sessionId = localStorage.getItem("iacw_session");
  if (!sessionId) {
    sessionId = (window.crypto && crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()).replace(/-/g, "");
    localStorage.setItem("iacw_session", sessionId);
  }

  function bubble(text, who) {
    var row = document.createElement("div");
    row.className = "iacw-row iacw-" + who;
    var b = document.createElement("div");
    b.className = "iacw-b";
    b.textContent = text;
    row.appendChild(b);
    msgsEl.appendChild(row);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    return row;
  }
  function typing(on) {
    var ex = document.getElementById("iacw-typing");
    if (on && !ex) {
      var row = document.createElement("div");
      row.id = "iacw-typing";
      row.className = "iacw-row iacw-ai iacw-typing";
      row.innerHTML = '<div class="iacw-b"><span></span><span></span><span></span></div>';
      msgsEl.appendChild(row);
      msgsEl.scrollTop = msgsEl.scrollHeight;
    } else if (!on && ex) { ex.remove(); }
  }

  function openPanel() {
    panel.classList.add("iacw-open");
    if (!greeted) {
      bubble("Hi! I'm the virtual assistant for Integrity Air Conditioning & Heating. How can I help — service questions, hours, or scheduling a visit?", "ai");
      greeted = true;
    }
    inputEl.focus();
  }
  function closePanel() { panel.classList.remove("iacw-open"); }

  async function send() {
    var text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    sendEl.disabled = true;
    bubble(text, "user");
    typing(true);
    try {
      var res = await fetch(API_BASE + "/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" },
        body: JSON.stringify({ session_id: sessionId, message: text })
      });
      var data = await res.json();
      typing(false);
      if (data.session_id) { sessionId = data.session_id; localStorage.setItem("iacw_session", sessionId); }
      bubble(data.reply || "Sorry, something went wrong. Please try again.", "ai");
    } catch (e) {
      typing(false);
      bubble("Network error — please try again in a moment.", "ai");
    } finally {
      sendEl.disabled = false;
      inputEl.focus();
    }
  }

  launch.addEventListener("click", function () {
    panel.classList.contains("iacw-open") ? closePanel() : openPanel();
  });
  document.getElementById("iacw-close").addEventListener("click", closePanel);
  sendEl.addEventListener("click", send);
  inputEl.addEventListener("keydown", function (e) { if (e.key === "Enter") send(); });
})();
</script>
